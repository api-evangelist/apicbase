aid: apicbase
url: https://raw.githubusercontent.com/api-evangelist/apicbase/refs/heads/main/apis.yml
name: Apicbase
kind: company
description: Apicbase is a cloud-based food & beverage back-of-house management platform
  for restaurants, hotels, and catering groups, covering recipes and menu engineering,
  ingredient libraries, inventory and stock, procurement, suppliers, and multi-outlet
  operations. The Apicbase REST API exposes these entities over HTTPS with OAuth 2.0
  authentication, plus webhooks for integrated supplier ordering.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Food and Beverage
- Restaurant
- Back of House
- Inventory
- Procurement
- Recipes
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
