specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Apicbase
providerId: apicbase
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Food and Beverage
- Restaurant
- Back of House
- Inventory
- Procurement
- Recipes
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Apicbase spend. Apicbase bills as a subscription SaaS priced
  by number of outlets and selected modules rather than per-API-call usage.
  API access is included with the platform subscription. Because pricing is
  sales-led and quoted per customer, specific rates are not reconciled here;
  cost is driven by outlet count and module selection.
notes: >-
  Subscription rates are quoted per customer and vary by outlets and modules.
  Verify against an Apicbase quote during reconciliation.
sources:
- https://get.apicbase.com/pricing-plans/
- https://www.apicbase.com
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Apicbase
serviceCategory: Management and Governance
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: EUR
  chargeCategories:
  - Usage
  - Purchase
meters:
- name: outlet_subscriptions
  description: Active outlets (locations) under the subscription, the primary cost driver.
  unit: outlets
  aggregation: sum
  dimensions:
  - account
  - outlet
- name: module_subscriptions
  description: Optional add-on modules enabled on the subscription (procurement, production, analytics).
  unit: modules
  aggregation: sum
  dimensions:
  - account
  - module
principles:
- name: Visibility
  description: Track active outlets and enabled modules against the Apicbase subscription invoice.
- name: Allocation
  description: Map outlets and modules to brands, regions, or cost centers within the restaurant group.
- name: Optimization
  description: Right-size enabled modules and outlet count; consolidate libraries to avoid duplicate subscriptions.
- name: Accountability
  description: Assign an owner per outlet/brand; review the subscription against operational footprint periodically.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
